<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书爆款文案生成器 💖</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: linear-gradient(to right, #ffe6f0, #fff0f5); font-family:"Microsoft YaHei", sans-serif; padding:30px;}
h2 { text-align:center; margin-bottom:20px; color:#d63384; }
.card { margin-bottom:15px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.copy-btn { float:right; }
#result { margin-top:20px; }
#loading { display:none; text-align:center; margin:20px; color:#d63384; font-weight:bold; }
#quota { font-weight:bold; color:#d63384; }
</style>
</head>
<body>
<div class="container">
  <h2>🔥 小红书爆款文案生成器 🔥</h2>
  <p>剩余额度：<span id="quota">5</span> 次</p>
  <div class="row g-3 mb-3 justify-content-center">
    <div class="col-md-3"><input class="form-control" type="text" id="theme" placeholder="主题"></div>
    <div class="col-md-2"><input class="form-control" type="number" id="num" value="1" min="1" max="10"></div>
    <div class="col-md-2"><button class="btn btn-danger w-100" id="generate">生成文案</button></div>
  </div>
  <div id="loading">生成中，请稍候... ⏳</div>
  <div id="result"></div>
</div>

<script>
const API = "https://xiaohongshu-ai.onrender.com";

let quota = 5; // 初始显示额度

const generateBtn = document.getElementById('generate');
const resultDiv = document.getElementById('result');
const loadingDiv = document.getElementById('loading');
const quotaSpan = document.getElementById('quota');

async function generateContent(){
    const theme = document.getElementById('theme').value;
    const num = parseInt(document.getElementById('num').value);

    if(!theme){ alert('请输入主题'); return; }
    if(num > quota){ alert('额度不足'); return; }

    loadingDiv.style.display = 'block';
    resultDiv.innerHTML = '';

    try{
        const res = await fetch(API + '/generate',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({theme,num})
        });
        const json = await res.json();
        if(json.error){ alert(json.error); return; }

        const items = json.text.split("\n").filter(t=>t.trim()!==""); // 简单分行
        resultDiv.innerHTML = items.map((item,i)=>`
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">${i+1}. ${item} 
                        <button class="btn btn-sm btn-outline-primary copy-btn" data-index="${i}">复制</button>
                    </h5>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.copy-btn').forEach(btn=>{
            btn.addEventListener('click', e=>{
                const idx = e.target.dataset.index;
                navigator.clipboard.writeText(items[idx]);
                alert('已复制 ✅');
            });
        });

        quota -= num;
        quotaSpan.innerText = quota;

    }catch(err){
        alert('生成失败，请稍候重试');
    }finally{
        loadingDiv.style.display = 'none';
    }
}

generateBtn.addEventListener('click', generateContent);
</script>
</body>
</html>
